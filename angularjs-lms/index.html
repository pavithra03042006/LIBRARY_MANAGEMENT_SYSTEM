<!DOCTYPE html>
<html lang="en" ng-app="lmsApp">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Management System</title>
  <meta name="description" content="A comprehensive AngularJS library management system for books, members, transactions, and fines." />

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- App Styles -->
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- AngularJS ng-view renders routed views here -->
  <div ng-view></div>

  <!-- AngularJS 1.8 + ngRoute -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Core App Module + Routing -->
  <script src="app.js"></script>

  <!-- Services -->
  <script src="services/storage.service.js"></script>
  <script src="services/auth.service.js"></script>
  <script src="services/book.service.js"></script>
  <script src="services/member.service.js"></script>
  <script src="services/transaction.service.js"></script>

  <!-- Controllers -->
  <script src="controllers/login.controller.js"></script>
  <script src="controllers/dashboard.controller.js"></script>
  <script src="controllers/books.controller.js"></script>
  <script src="controllers/members.controller.js"></script>
  <script src="controllers/transactions.controller.js"></script>

</body>
</html>
