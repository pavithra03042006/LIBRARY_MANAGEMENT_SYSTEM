<!-- Shared Sidebar — matches components/dashboard/sidebar.tsx exactly -->
<aside class="sidebar">
  <!-- Logo block: flex h-16 items-center gap-3 px-6 border-b border-sidebar-border -->
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">
      <i class="bi bi-book-half"></i>
    </div>
    <div>
      <h1 style="font-size:1.125rem;font-weight:600;color:var(--sidebar-foreground);margin:0;line-height:1.3;">LibraryMS</h1>
      <p style="font-size:0.75rem;color:var(--muted-foreground);margin:0;">Management System</p>
    </div>
  </div>

  <!-- Nav (flex-1, space-y-1, px-3 py-4) -->
  <nav>
    <a class="nav-link" ng-href="#/dashboard"
       ng-class="{'active': isActive('/dashboard')}">
      <i class="bi bi-speedometer2" style="height:1.25rem;width:1.25rem;"></i>
      Dashboard
    </a>
    <a class="nav-link" ng-href="#/books"
       ng-class="{'active': isActive('/books')}">
      <i class="bi bi-book-open" style="height:1.25rem;width:1.25rem;"></i>
      Books
    </a>
    <a class="nav-link" ng-href="#/members"
       ng-class="{'active': isActive('/members')}">
      <i class="bi bi-people" style="height:1.25rem;width:1.25rem;"></i>
      Members
    </a>
    <a class="nav-link" ng-href="#/transactions"
       ng-class="{'active': isActive('/transactions')}">
      <i class="bi bi-arrow-left-right" style="height:1.25rem;width:1.25rem;"></i>
      Issue / Return
    </a>
  </nav>

  <!-- Footer: border-t border-sidebar-border p-4 -->
  <div class="sidebar-footer">
    <!-- User avatar + name -->
    <div class="flex items-center gap-3 mb-3">
      <div class="user-avatar-circle">
        {{ currentUser.name.charAt(0).toUpperCase() }}
      </div>
      <div style="flex:1;overflow:hidden;">
        <p class="truncate text-sm font-medium" style="color:var(--sidebar-foreground);margin:0;">{{ currentUser.name }}</p>
        <p class="truncate text-xs capitalize" style="color:var(--muted-foreground);margin:0;">{{ currentUser.role }}</p>
      </div>
    </div>
    <!-- Sign out button -->
    <button class="btn btn-ghost w-full" style="justify-content:flex-start;gap:0.5rem;color:var(--muted-foreground);"
            ng-click="logout()"
            onmouseenter="this.style.color='var(--destructive)'"
            onmouseleave="this.style.color='var(--muted-foreground)'">
      <i class="bi bi-box-arrow-right" style="width:1rem;height:1rem;"></i>
      Sign out
    </button>
  </div>
</aside>
